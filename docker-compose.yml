services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9091" --address ":9090"
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - glue-gap-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    environment:
      PORT: ${API_GATEWAY_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      IMAGE_PROCESSOR_URL: ${IMAGE_PROCESSOR_URL}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - glue-gap-net

  image-processor:
    build:
      context: ./image-processor
      dockerfile: Dockerfile
    ports:
      - "${IMAGE_PROCESSOR_PORT}:${IMAGE_PROCESSOR_PORT}"
    volumes:
      # Bind-mount source so edits take effect on container restart (no rebuild needed)
      - ./image-processor/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${IMAGE_PROCESSOR_PORT}", "--reload"]
    environment:
      MINIO_ENDPOINT: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - glue-gap-net

volumes:
  minio_data:

networks:
  glue-gap-net:
    driver: bridge
